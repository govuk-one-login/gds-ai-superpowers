name: Publish bundle to GitHub Pages

# On merge to `main`, derive the next semantic version from the Conventional Commits since
# the last release tag (scripts/next-version.sh), then publish the agent-manager bundle —
# without ever writing to `main` and without a `gh-pages` branch:
#
#   - the version is recorded as a `vX.Y.Z` GitHub Release (auto-generated notes are the
#     changelog), with the built bundle attached as Release ASSETS — the durable archive;
#   - the site served at https://<owner>.github.io/<repo>/agents/... is RENDERED to Pages
#     via the official Actions deployment, gated by the `github-pages` environment.
#
# Versions ACCUMULATE as Release assets, not on a branch. `deploy-pages` replaces the whole
# site each run, so the job reconstructs every version from its Release before deploying —
# that is what keeps pinned `bundle-version:` installs working.
#
# IMPORTANT: this workflow writes ONLY to tags/Releases and the `github-pages` environment —
# never to `main` (which is PR-only with required signatures) and never to a `gh-pages`
# branch (there is none — nothing for a write-access dev to overwrite). Only first-party
# actions are used (actions/checkout, actions/upload-pages-artifact, actions/deploy-pages)
# plus the preinstalled gh CLI.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # create the release + tag, and read/download prior release assets
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token required by actions/deploy-pages

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out source (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # next-version.sh needs tags + full log

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          version="$(./scripts/next-version.sh)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "$version" = "none" ]; then
            echo "No release-worthy commits since the last tag — nothing to publish."
          else
            echo "Releasing version: $version"
          fi

      # Rebuild the version archive from the Releases (the durable store). deploy-pages
      # replaces the whole site, so every prior version must be restored each run. First
      # run has no releases yet — tolerate that.
      - name: Restore prior versions from Releases
        if: ${{ steps.ver.outputs.version != 'none' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist/agents
          for tag in $(gh release list --limit 1000 --json tagName --jq '.[].tagName'); do
            ver="${tag#v}"
            echo "Restoring $tag -> dist/agents/$ver"
            mkdir -p "dist/agents/$ver"
            gh release download "$tag" --dir "dist/agents/$ver" \
              -p 'bundle.zip' -p 'bundle.zip.sha256' -p 'manifest.json' --clobber \
              || echo "  (no bundle assets on $tag — skipping)"
          done

      # Build the new version AND regenerate index.json across every version now present in
      # dist/ (restored priors + the new one) — build-bundle.sh owns the index logic.
      - name: Build bundle
        if: ${{ steps.ver.outputs.version != 'none' }}
        run: ./scripts/build-bundle.sh "${{ steps.ver.outputs.version }}"

      # Record the version as a Release with its bundle attached (the archive). Creating the
      # release also creates the vX.Y.Z tag and renders changelog notes from the commits.
      - name: Create release + attach bundle assets
        if: ${{ steps.ver.outputs.version != 'none' }}
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "v${VERSION}" \
            --generate-notes \
            "dist/agents/${VERSION}/bundle.zip" \
            "dist/agents/${VERSION}/bundle.zip.sha256" \
            "dist/agents/${VERSION}/manifest.json"

      - name: Disable Jekyll
        if: ${{ steps.ver.outputs.version != 'none' }}
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        if: ${{ steps.ver.outputs.version != 'none' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        if: ${{ steps.ver.outputs.version != 'none' }}
        uses: actions/deploy-pages@v4
