name: Publish bundle to GitHub Pages

# On merge to `main`, derive the next semantic version from the Conventional Commits since
# the last release tag (scripts/next-version.sh), tag it as a GitHub Release (which renders
# changelog notes from the reviewed commits), build the agent-manager bundle, and publish it
# to the `gh-pages` branch (served by GitHub Pages at
# https://<owner>.github.io/<repo>/agents/...). The reviewed PR merge is the human approval;
# the version is a deterministic consequence of the commit types.
#
# Versions ACCUMULATE on gh-pages (the build seeds from what's already published and
# regenerates the index across all of them), so pinned `bundle-version:` installs keep
# working.
#
# IMPORTANT: this workflow writes ONLY to the `gh-pages` branch and to tags/releases — never
# to `main`. `main` is PR-only with required signatures (the `Main-Protection` ruleset), so
# CI must not push commits to it. Tags are not ruleset-protected, so the release tag is the
# durable record of the version. Only first-party actions (actions/checkout, gh CLI) are used.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # used to create the release/tag and push the gh-pages branch

concurrency:
  group: publish-bundle
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # next-version.sh needs tags + full log

      # Bring the already-published bundle (all prior versions) into ./published.
      # First-ever run has no gh-pages branch yet — tolerate that.
      - name: Check out existing gh-pages (prior versions)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: published

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          version="$(./scripts/next-version.sh)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "$version" = "none" ]; then
            echo "No release-worthy commits since the last tag — nothing to publish."
          else
            echo "Releasing version: $version"
          fi

      # Tag the release and let GitHub render the changelog from the reviewed commits.
      # This creates the vX.Y.Z tag too (tags are not ruleset-protected) — nothing is
      # pushed to `main`.
      - name: Tag the release (with generated notes)
        if: ${{ steps.ver.outputs.version != 'none' }}
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "v${VERSION}" \
            --generate-notes

      # Seed dist/ with every previously published version so the index, regenerated
      # by build-bundle.sh, lists old + new.
      - name: Seed prior versions into dist/
        if: ${{ steps.ver.outputs.version != 'none' }}
        run: |
          set -euo pipefail
          mkdir -p dist/agents
          if [ -d published/agents ]; then
            cp -R published/agents/. dist/agents/
            rm -f dist/agents/index.json
          fi

      - name: Build bundle
        if: ${{ steps.ver.outputs.version != 'none' }}
        run: ./scripts/build-bundle.sh "${{ steps.ver.outputs.version }}"

      - name: Disable Jekyll
        if: ${{ steps.ver.outputs.version != 'none' }}
        run: touch dist/.nojekyll

      - name: Publish to gh-pages
        if: ${{ steps.ver.outputs.version != 'none' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -q -m "Publish bundle v${{ steps.ver.outputs.version }}"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
          echo "Published. Pages serves it at:"
          echo "  https://$(echo "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]').github.io/${GITHUB_REPOSITORY#*/}/agents/index.json"
