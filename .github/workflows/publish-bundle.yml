name: Publish bundle to GitHub Pages

# On merge to `main`, build the agent-manager bundle and publish it to the `gh-pages`
# branch, which GitHub Pages serves at https://<owner>.github.io/<repo>/agents/... — so
# the library installs with:
#   npx @ai-agent-manager/cli@latest https://govuk-one-login.github.io/gds-ai-superpowers
#
# The published version is whatever the VERSION file says. Bump VERSION in a normal PR
# to publish a new version; otherwise each merge republishes the current one. Versions
# ACCUMULATE on gh-pages (the build seeds from what's already published and regenerates
# the index across all of them), so pinned `bundle-version:` installs keep working.
#
# IMPORTANT: this workflow writes ONLY to the `gh-pages` branch — never to `main`. `main`
# is PR-only with required signatures, so CI must not push commits or tags to it. Only the
# first-party actions/checkout action is used.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # used only to push the gh-pages branch

concurrency:
  group: publish-bundle
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      # Bring the already-published bundle (all prior versions) into ./published so the
      # rebuilt index lists old + new. First-ever run has no gh-pages branch yet — tolerate it.
      - name: Check out existing gh-pages (prior versions)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: published

      - name: Seed prior versions into dist/
        run: |
          set -euo pipefail
          mkdir -p dist/agents
          if [ -d published/agents ]; then
            cp -R published/agents/. dist/agents/
            rm -f dist/agents/index.json
          fi

      - name: Build bundle (version from the VERSION file)
        run: ./scripts/build-bundle.sh

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git add -A
          git -c user.name='github-actions[bot]' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit -q -m "Publish bundle (VERSION ${version})"
          git push -f \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
          echo "Published. Pages serves it at:"
          echo "  https://$(echo "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]').github.io/${GITHUB_REPOSITORY#*/}/agents/index.json"
